name: PySpark ETL CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  S3_SCRIPTS_BUCKET: pyspark-test-bucket-data
  S3_SCRIPTS_PREFIX: scripts
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint
        run: flake8 src/ --max-line-length=120 --ignore=E501,W503
        continue-on-error: true

  deploy:
    name: Deploy to S3 & Run ETL
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync scripts to S3
        run: |
          aws s3 sync src/ s3://${{ env.S3_SCRIPTS_BUCKET }}/${{ env.S3_SCRIPTS_PREFIX }}/src/ \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --delete

      - name: Build Docker image
        run: docker build -t pyspark-etl:${{ github.sha }} .

      - name: Run ETL job
        run: |
          docker run --rm \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -e AWS_REGION=${{ secrets.AWS_REGION }} \
            pyspark-etl:${{ github.sha }}

name: PySpark ETL CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  S3_SCRIPTS_BUCKET: pyspark-test-bucket-data
  S3_SCRIPTS_PREFIX: scripts
  AWS_REGION: us-east-1
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt flake8

      - name: Lint
        run: flake8 src/ --max-line-length=120 --ignore=E501

  deploy:
    name: Upload Scripts to S3 & Run ETL on AWS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync scripts to S3
        run: |
          aws s3 sync src/ s3://${{ env.S3_SCRIPTS_BUCKET }}/${{ env.S3_SCRIPTS_PREFIX }}/src/ \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --delete

      - name: Build Docker image
        run: docker build -t pyspark-etl:${{ github.sha }} .

      - name: Login to ECR (Optional - if using ECR)
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ECR_REGISTRY }}
        continue-on-error: true

      - name: Run ETL job with Docker
        run: |
          docker run --rm \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -e AWS_REGION=${{ secrets.AWS_REGION }} \
            pyspark-etl:${{ github.sha }}

      # ALTERNATIVE: Submit job to EMR cluster (if using EMR)
      # Uncomment this section if you want to submit to EMR instead
      # - name: Submit job to EMR cluster
      #   run: |
      #     CLUSTER_ID=$(aws emr list-clusters --active --query 'Clusters[0].Id' --output text)
      #     aws emr add-steps \
      #       --cluster-id $CLUSTER_ID \
      #       --steps Type=Spark,Name="PySpark ETL Job",ActionOnFailure=CONTINUE,Args=[spark-submit,s3://${{ env.S3_SCRIPTS_BUCKET }}/${{ env.S3_SCRIPTS_PREFIX }}/src/jobs/main.py]

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Deployment Success
        if: needs.deploy.result == 'success'
        run: echo "✅ PySpark ETL deployment to AWS completed successfully!"

      - name: Deployment Failed
        if: needs.deploy.result == 'failure'
        run: echo "❌ PySpark ETL deployment failed. Check logs for details."
        continue-on-error: true
#!/bin/bash
set -e

# ─────────────────────────────────────────
# CONFIG
# ─────────────────────────────────────────
S3_SCRIPTS_BUCKET="pyspark-test-bucket-data"
S3_SCRIPTS_PREFIX="scripts"
IMAGE_NAME="pyspark-etl"
SHA="${GITHUB_SHA:-$(git rev-parse HEAD)}"
ZIP_NAME="dependencies.zip"
SRC_DIR="src"

echo "🚀 Starting Deploy Script"
echo "   Commit SHA : $SHA"
echo "   S3 Bucket  : s3://$S3_SCRIPTS_BUCKET/$S3_SCRIPTS_PREFIX/"

# ─────────────────────────────────────────
# STEP 1: Package dependencies into ZIP
# (Excludes: jobs/, __pycache__, *.pyc)
# ─────────────────────────────────────────
echo ""
echo "📦 Packaging dependencies into $ZIP_NAME ..."

rm -f "$ZIP_NAME"

cd "$SRC_DIR"

zip -r "../$ZIP_NAME" . \
  --exclude "jobs/*" \
  --exclude "*/__pycache__/*" \
  --exclude "__pycache__/*" \
  --exclude "*.pyc"

cd ..

echo "✅ Created $ZIP_NAME"
echo "   Contents:"
unzip -l "$ZIP_NAME" | tail -n +4 | head -n -2

# ─────────────────────────────────────────
# STEP 2: Upload ZIP to S3
# ─────────────────────────────────────────
echo ""
echo "☁️  Uploading $ZIP_NAME to S3..."

aws s3 cp "$ZIP_NAME" \
  "s3://$S3_SCRIPTS_BUCKET/$S3_SCRIPTS_PREFIX/$ZIP_NAME"

echo "✅ Uploaded to s3://$S3_SCRIPTS_BUCKET/$S3_SCRIPTS_PREFIX/$ZIP_NAME"

# ─────────────────────────────────────────
# STEP 3: Sync full src/ to S3
# (keeps raw scripts available alongside ZIP)
# ─────────────────────────────────────────
echo ""
echo "🔄 Syncing src/ scripts to S3..."

aws s3 sync "$SRC_DIR/" \
  "s3://$S3_SCRIPTS_BUCKET/$S3_SCRIPTS_PREFIX/src/" \
  --exclude "__pycache__/*" \
  --exclude "*.pyc" \
  --delete

echo "✅ Sync complete"

# ─────────────────────────────────────────
# STEP 4: Build Docker image
# ─────────────────────────────────────────
echo ""
echo "🐳 Building Docker image: $IMAGE_NAME:$SHA ..."

docker build -t "$IMAGE_NAME:$SHA" .

echo "✅ Docker image built"

# ─────────────────────────────────────────
# STEP 5: Run ETL job
# ─────────────────────────────────────────
echo ""
echo "⚡ Running ETL job..."

docker run --rm \
  -e AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID" \
  -e AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY" \
  -e AWS_REGION="$AWS_REGION" \
  "$IMAGE_NAME:$SHA"

echo ""
echo "🎉 Deploy complete!"
